server {
    listen 80;
    
    # Root directory where the static files are stored
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Important for React Router (Single Page Application)
    # This tells Nginx to route all requests to index.html if the file is not found
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
